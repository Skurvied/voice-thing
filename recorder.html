<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Line Recorder</title>
  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Dark Theme Variables */
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-tertiary: #242736;
      --border-color: #2e3248;
      --text-primary: #e8eaf0;
      --text-secondary: #9aa0b8;
      --text-muted: #5c6280;
      --accent-primary: #6c7ef7;
      --accent-hover: #8491f9;
      --accent-active: #5a6be0;
      --accent-glow: rgba(108, 126, 247, 0.2);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    }

    /* Base */
    html, body {
      height: 100%;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* App container */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Landing Screen */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    /* Logo / Icon area */
    .landing__icon {
      width: 72px;
      height: 72px;
      background-color: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing__icon svg {
      width: 36px;
      height: 36px;
      fill: var(--accent-primary);
    }

    /* Title */
    .landing__title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .landing__subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 340px;
      line-height: 1.6;
    }

    /* Load Script button */
    .btn-load {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background-color: var(--accent-primary);
      color: #ffffff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      box-shadow: 0 0 0 0 var(--accent-glow);
      letter-spacing: 0.01em;
    }

    .btn-load:hover {
      background-color: var(--accent-hover);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-load:active {
      background-color: var(--accent-active);
      transform: translateY(1px);
    }

    .btn-load:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 3px;
    }

    .btn-load svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Hidden file input */
    .file-input-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip-path: inset(50%);
      white-space: nowrap;
    }

    /* Footer */
    .landing__footer {
      font-size: 0.825rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    /* Divider */
    .landing__divider {
      width: 40px;
      height: 2px;
      background-color: var(--border-color);
      border-radius: 2px;
    }

    /* ── Setup Screen ────────────────────────────────────────────────────────── */

    .setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .setup__icon {
      width: 60px;
      height: 60px;
      background-color: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .setup__icon svg {
      width: 28px;
      height: 28px;
      fill: var(--accent-primary);
    }

    .setup__title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    /* Info card */
    .setup__card {
      width: 100%;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }

    .setup__info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.875rem 1.25rem;
      gap: 1rem;
    }

    .setup__info-row + .setup__info-row {
      border-top: 1px solid var(--border-color);
    }

    .setup__info-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .setup__info-value {
      font-size: 0.875rem;
      color: var(--text-primary);
      font-weight: 500;
      text-align: right;
    }

    /* Saving section */
    .setup__saving {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    /* Notice (zip mode) */
    .setup__notice {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-align: left;
      width: 100%;
    }

    /* Choose Output Folder button */
    .btn-choose-folder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .btn-choose-folder:hover {
      background-color: var(--bg-secondary);
      border-color: var(--accent-primary);
    }

    .btn-choose-folder:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 3px;
    }

    .btn-choose-folder--selected {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    /* Begin Recording button */
    .btn-begin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--accent-primary);
      color: #ffffff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      box-shadow: 0 0 0 0 var(--accent-glow);
      letter-spacing: 0.01em;
    }

    .btn-begin:hover {
      background-color: var(--accent-hover);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-begin:active {
      background-color: var(--accent-active);
      transform: translateY(1px);
    }

    .btn-begin:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 3px;
    }

    /* ── Recording Screen ────────────────────────────────────────────────────── */

    .recording-screen { display: flex; height: 100vh; }
    .sidebar { width: 250px; overflow-y: auto; border-right: 1px solid var(--border-color, #333); background: var(--bg-secondary); }
    .sidebar-item { padding: 8px 12px; cursor: pointer; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sidebar-item:hover { background: rgba(255,255,255,0.05); }
    .sidebar-item.active { background: var(--accent-primary, #6366f1); color: #fff; }
    .sidebar-item.completed::before { content: '\2713  '; color: #4caf50; }
    .sidebar-item.needs-rerecord::before { content: '\26A0  '; color: #ff9800; }
    .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2em; position: relative; }
    .line-text { font-size: 1.5em; line-height: 1.6; max-width: 700px; text-align: center; margin-bottom: 1em; }
    .progress { font-size: 0.9em; opacity: 0.6; margin-bottom: 2em; }
    .file-label { font-size: 0.85em; opacity: 0.5; margin-bottom: 0.5em; font-family: monospace; }
    .display-name { font-size: 0.8em; opacity: 0.4; margin-bottom: 2em; }
    .record-prompt { font-size: 1.1em; opacity: 0.7; margin-top: 1em; }
    .shortcuts-footer { position: absolute; bottom: 1em; font-size: 0.75em; opacity: 0.4; font-family: monospace; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .recording-dot { width: 16px; height: 16px; background: #e53935; border-radius: 50%; animation: pulse 1s infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }

    /* ── Review action buttons ───────────────────────────────────────────────── */

    .review-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .review-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-size: 0.925rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      letter-spacing: 0.01em;
    }

    .review-actions button:active {
      transform: translateY(1px);
    }

    .review-actions button:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 3px;
    }

    /* Play — neutral/info (blue-gray) */
    .btn-play {
      background-color: #3a4a6b;
      color: #c5d4f5;
    }

    .btn-play:hover {
      background-color: #4a5e88;
      box-shadow: 0 4px 16px rgba(58, 74, 107, 0.5);
    }

    /* Keep — green/success */
    .btn-keep {
      background-color: #1e6b3a;
      color: #a4f0c0;
    }

    .btn-keep:hover {
      background-color: #27884a;
      box-shadow: 0 4px 16px rgba(30, 107, 58, 0.5);
    }

    /* Retry — amber/warning */
    .btn-retry {
      background-color: #6b4a0e;
      color: #fcd770;
    }

    .btn-retry:hover {
      background-color: #885e12;
      box-shadow: 0 4px 16px rgba(107, 74, 14, 0.5);
    }

    /* ── Zip download button ─────────────────────────────────────────────────── */

    .btn-zip-download {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--accent-primary);
      border-radius: 8px;
      background-color: var(--bg-tertiary);
      color: var(--accent-primary);
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      z-index: 10;
    }

    .btn-zip-download:hover {
      background-color: var(--accent-primary);
      color: #ffffff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn-zip-download:active {
      transform: translateY(1px);
    }

    .btn-zip-download:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 3px;
    }

    /* ── Completion Screen ───────────────────────────────────────────────────── */

    .completion {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2em;
    }

    .completion h1 { font-size: 2.5em; margin-bottom: 0.5em; }
    .completion p { font-size: 1.2em; opacity: 0.7; margin-bottom: 2em; }

    /* ── Global button transitions ───────────────────────────────────────────── */

    button {
      transition: all 0.15s ease;
    }

    /* ── Screen fade ─────────────────────────────────────────────────────────── */

    #app {
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    (function () {
      'use strict';

      var SVG_NS = 'http://www.w3.org/2000/svg';

      // ── App state ─────────────────────────────────────────────────────────────

      var state = {
        entries: [],
        scriptName: '',
        currentIndex: 0,
        completedLines: new Set(),
        needsRerecord: new Set(),
        screen: 'landing',
        browser: null,
        dirHandle: null,
        recordingState: 'idle',
        micStream: null,
        audioCtx: null,
        currentRecording: null,
        modalOpen: false,
        playbackAudio: null,
        zipEntries: new Map(),
        storageAvailable: false,
        sessionKey: ''
      };

      // ── Browser detection ────────────────────────────────────────────────────

      /**
       * Detect the current browser and whether it supports the File System Access API.
       * @returns {{ name: string, canDirectSave: boolean }}
       */
      function detectBrowser() {
        var ua = navigator.userAgent;
        var name = 'Unknown';

        if (ua.includes('Firefox')) name = 'Firefox';
        else if (ua.includes('Edg/')) name = 'Edge';
        else if (ua.includes('OPR/') || ua.includes('Opera')) name = 'Opera';
        else if (ua.includes('Brave')) name = 'Brave';
        else if (ua.includes('Arc')) name = 'Arc';
        else if (ua.includes('Chrome')) name = 'Chrome';
        else if (ua.includes('Safari')) name = 'Safari';

        // Feature-detect File System Access API rather than relying solely on UA
        var canDirectSave = typeof window.showDirectoryPicker === 'function';

        return { name: name, canDirectSave: canDirectSave };
      }

      // ── Script parser ─────────────────────────────────────────────────────────

      /**
       * Parse a pipe-delimited script file.
       * Line 0 is treated as a header and skipped.
       * Each subsequent non-empty line must contain at least one `|`.
       * @param {string} rawText
       * @returns {Array<{filename: string, text: string, displayName: string}>}
       */
      function parseScript(rawText) {
        var lines = rawText.split('\n').filter(function(l) { return l.trim(); });
        if (lines.length < 2) throw new Error('Script file is empty or has only a header row.');

        var entries = [];
        var seenFilenames = {};
        var duplicates = [];

        for (var i = 1; i < lines.length; i++) {
          var pipeIdx = lines[i].indexOf('|');
          if (pipeIdx === -1) continue;
          var filename = lines[i].slice(0, pipeIdx).trim();
          var text = lines[i].slice(pipeIdx + 1).trim();
          if (!filename || !text) continue;

          if (seenFilenames[filename]) {
            duplicates.push(filename);
          } else {
            seenFilenames[filename] = true;
          }

          var displayName = text
            .toLowerCase()
            .replace(/[^a-z0-9\s]/g, '')
            .replace(/\s+/g, '_')
            .slice(0, 60);

          entries.push({ filename: filename, text: text, displayName: displayName });
        }

        if (duplicates.length > 0) {
          throw new Error('Duplicate filenames found: ' + duplicates.join(', '));
        }

        return entries;
      }

      // ── UI helpers ────────────────────────────────────────────────────────────

      /**
       * Display an error message on the landing screen.
       * Finds or creates a dedicated error paragraph and sets its text safely.
       * @param {string} msg
       */
      function showError(msg) {
        var errorEl = document.getElementById('landing-error');
        if (!errorEl) {
          errorEl = document.createElement('p');
          errorEl.id = 'landing-error';
          errorEl.style.cssText = 'color:#f87171;font-size:0.875rem;margin-top:0.5rem;';
          var landing = document.querySelector('.landing');
          if (landing) {
            landing.appendChild(errorEl);
          }
        }
        errorEl.textContent = msg;
      }

      /**
       * Show a resume modal when a saved session is found.
       * @param {{ currentIndex: number, completedLines: number[] }} session
       */
      function showResumeModal(session) {
        state.modalOpen = true;
        var total = state.entries.length;
        var doneCount = session.completedLines.length;

        // Overlay
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,17,23,0.92);display:flex;align-items:center;justify-content:center;z-index:9999;padding:2rem;';

        // Modal card
        var modal = document.createElement('div');
        modal.style.cssText = 'background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;padding:2rem;max-width:420px;width:100%;display:flex;flex-direction:column;gap:1.25rem;';

        // Title
        var title = document.createElement('h2');
        title.style.cssText = 'font-size:1.25rem;font-weight:700;color:var(--text-primary);margin:0;';
        title.textContent = 'Resume Session?';
        modal.appendChild(title);

        // Message
        var msg = document.createElement('p');
        msg.style.cssText = 'font-size:0.95rem;color:var(--text-secondary);line-height:1.6;margin:0;';
        msg.textContent = 'You have a session in progress (' + doneCount + ' / ' + total + ' complete). Resume or Start Over?';
        modal.appendChild(msg);

        // Buttons row
        var btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex;gap:0.75rem;justify-content:flex-end;flex-wrap:wrap;';

        // Start Over button
        var startOverBtn = document.createElement('button');
        startOverBtn.type = 'button';
        startOverBtn.style.cssText = 'font-family:var(--font-sans);font-size:0.9rem;font-weight:600;padding:0.6rem 1.2rem;border-radius:10px;cursor:pointer;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-color);';
        startOverBtn.textContent = 'Start Over';
        startOverBtn.addEventListener('click', function () {
          try { localStorage.removeItem(state.sessionKey); } catch (e) { /* ignore */ }
          state.currentIndex = 0;
          state.completedLines = new Set();
          state.needsRerecord = new Set();
          document.body.removeChild(overlay);
          state.modalOpen = false;
          showSetupScreen();
        });
        btnRow.appendChild(startOverBtn);

        // Resume button
        var resumeBtn = document.createElement('button');
        resumeBtn.type = 'button';
        resumeBtn.style.cssText = 'font-family:var(--font-sans);font-size:0.9rem;font-weight:600;padding:0.6rem 1.2rem;border-radius:10px;cursor:pointer;background:var(--accent-primary);color:#ffffff;border:none;';
        resumeBtn.textContent = 'Resume';
        resumeBtn.addEventListener('click', function () {
          state.currentIndex = session.currentIndex;
          state.completedLines = new Set(session.completedLines);
          state.needsRerecord = new Set();
          // In zip mode, mark all restored completed lines as needs-rerecord
          var browser = detectBrowser();
          state.browser = browser;
          if (!browser.canDirectSave) {
            session.completedLines.forEach(function (idx) {
              state.needsRerecord.add(idx);
            });
          }
          document.body.removeChild(overlay);
          state.modalOpen = false;
          showSetupScreen();
        });
        btnRow.appendChild(resumeBtn);

        modal.appendChild(btnRow);
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
      }

      /**
       * Render the setup screen into the #app container.
       * Detects browser capabilities and lets the user choose an output folder
       * (direct save) or acknowledges zip-download mode before proceeding.
       */
      function showSetupScreen() {
        var browser = detectBrowser();
        state.browser = browser;
        state.screen = 'setup';

        // Clear #app safely
        var app = document.getElementById('app');
        while (app.firstChild) {
          app.removeChild(app.firstChild);
        }

        // Outer container
        var setup = document.createElement('div');
        setup.className = 'setup';

        // -- Icon (reuse mic)
        var iconWrap = document.createElement('div');
        iconWrap.className = 'setup__icon';
        iconWrap.appendChild(buildMicIcon());
        setup.appendChild(iconWrap);

        // -- Title
        var title = document.createElement('h1');
        title.className = 'setup__title';
        title.textContent = 'Setup';
        setup.appendChild(title);

        // -- Info card
        var card = document.createElement('div');
        card.className = 'setup__card';

        // Browser row
        var browserRow = document.createElement('div');
        browserRow.className = 'setup__info-row';
        var browserLabel = document.createElement('span');
        browserLabel.className = 'setup__info-label';
        browserLabel.textContent = 'Browser';
        var browserValue = document.createElement('span');
        browserValue.className = 'setup__info-value';
        browserValue.textContent = browser.name;
        browserRow.appendChild(browserLabel);
        browserRow.appendChild(browserValue);
        card.appendChild(browserRow);

        // Save mode row
        var modeRow = document.createElement('div');
        modeRow.className = 'setup__info-row';
        var modeLabel = document.createElement('span');
        modeLabel.className = 'setup__info-label';
        modeLabel.textContent = 'Save mode';
        var modeValue = document.createElement('span');
        modeValue.className = 'setup__info-value';
        modeValue.textContent = browser.canDirectSave ? 'Direct folder save' : 'Zip download';
        modeRow.appendChild(modeLabel);
        modeRow.appendChild(modeValue);
        card.appendChild(modeRow);

        // Script row
        var scriptRow = document.createElement('div');
        scriptRow.className = 'setup__info-row';
        var scriptLabel = document.createElement('span');
        scriptLabel.className = 'setup__info-label';
        scriptLabel.textContent = 'Script';
        var scriptValue = document.createElement('span');
        scriptValue.className = 'setup__info-value';
        scriptValue.textContent = state.entries.length + ' lines loaded from ' + state.scriptName;
        scriptRow.appendChild(scriptLabel);
        scriptRow.appendChild(scriptValue);
        card.appendChild(scriptRow);

        setup.appendChild(card);

        // -- Storage unavailable warning
        if (!state.storageAvailable) {
          var storageWarning = document.createElement('p');
          storageWarning.style.cssText = 'font-size:0.875rem;color:#f87171;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:0.875rem 1.25rem;width:100%;line-height:1.6;text-align:left;';
          storageWarning.textContent = 'Session saving is not available in this browser when opened as a local file. Your progress will not be saved between page reloads.';
          setup.appendChild(storageWarning);
        }

        // -- Saving section

       */
      function createSvgEl(tag, attrs) {
        var el = document.createElementNS(SVG_NS, tag);
        Object.keys(attrs).forEach(function (key) {
          el.setAttribute(key, attrs[key]);
        });
        return el;
      }

      /**

        landing.appendChild(title);

        subtitle.className = 'landing__subtitle';
        subtitle.textContent = 'Record audio for each line of your script. Load a .txt file to get started.';
        landing.appendChild(subtitle);

        landing.appendChild(divider);

        loadBtn.appendChild(btnLabel);

        loadBtn.addEventListener('click', function () {
          fileInput.click();
        });

        // Wire up file parsing on selection
        fileInput.addEventListener('change', function () {
          var file = fileInput.files && fileInput.files[0];
          if (!file) return;

          var reader = new FileReader();
          reader.onload = function (e) {
            try {
              var entries = parseScript(e.target.result);
              state.entries = entries;
              state.scriptName = file.name;
              state.storageAvailable = checkStorageAvailable();
              state.sessionKey = getSessionKey(state.scriptName, state.entries);
              var session = loadSession();
              if (session) {
                showResumeModal(session);
              } else {
                showSetupScreen();
              }
            } catch (err) {
              showError(err.message);
            }
          };

      // ── Recording Screen ─────────────────────────────────────────────────────

      /**
       * Re-render the sidebar list to reflect current completedLines and currentIndex.
       * Expects a .sidebar element to exist in the DOM.
       */
      function renderSidebar() {
        var sidebar = document.querySelector('.sidebar');
        if (!sidebar) return;

        // Clear existing items safely
        while (sidebar.firstChild) {
          sidebar.removeChild(sidebar.firstChild);
        }

        state.entries.forEach(function (entry, idx) {
          var item = document.createElement('div');
          item.className = 'sidebar-item';
          if (state.completedLines.has(idx)) {
            if (state.needsRerecord.has(idx)) {
              item.classList.add('needs-rerecord');
            } else {
              item.classList.add('completed');
            }
          }
          if (idx === state.currentIndex) {
            item.classList.add('active');
          }
          item.textContent = entry.filename;
          item.addEventListener('click', function () {
            state.currentIndex = idx;
            renderSidebar();
            renderMainArea();
          });
          sidebar.appendChild(item);
        });

        // Auto-scroll to keep the active item visible
        var activeItem = sidebar.querySelector('.sidebar-item.active');
        if (activeItem) {
          activeItem.scrollIntoView({ block: 'nearest' });
        }
      }

      /**
       * Re-render only the main area (right panel) based on current state.
       * Expects a .main-area element to exist in the DOM.
       */
      function renderMainArea() {
        var mainArea = document.querySelector('.main-area');
        if (!mainArea) return;

        // Clear existing content safely
        while (mainArea.firstChild) {
          mainArea.removeChild(mainArea.firstChild);
        }

        var entry = state.entries[state.currentIndex];
        var total = state.entries.length;

        // Recording state: red background tint
        if (state.recordingState === 'recording') {
          mainArea.style.backgroundColor = 'rgba(229, 57, 53, 0.07)';
          mainArea.style.transition = 'background-color 0.2s ease';
        } else {
          mainArea.style.backgroundColor = '';
          mainArea.style.transition = 'background-color 0.2s ease';
        }

        // Progress indicator
        var progress = document.createElement('p');
        progress.className = 'progress';
        progress.textContent = (state.currentIndex + 1) + ' / ' + total;
        mainArea.appendChild(progress);

        // Current line text
        var lineText = document.createElement('p');
        lineText.className = 'line-text';
        lineText.textContent = entry ? entry.text : '';
        mainArea.appendChild(lineText);

        // Target filename
        var fileLabel = document.createElement('p');
        fileLabel.className = 'file-label';
        fileLabel.textContent = entry ? entry.filename : '';
        mainArea.appendChild(fileLabel);

        // Human-readable display name

        // Recording state area

        if (state.recordingState === 'recording') {
          var dot = document.createElement('span');
          dot.className = 'recording-dot';

      /**
       * Request microphone access and set up the AudioContext.
       * Displays a blocking error overlay on failure.
       */
      async function initMicrophone() {
        try {
          state.micStream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: 44100, channelCount: 1, echoCancellation: false }
          });
          state.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        } catch (err) {
          var msg = 'Microphone error: ' + err.message;
          if (err.name === 'NotAllowedError') msg = 'Microphone access denied. Please allow microphone access in your browser settings and reload.';
          else if (err.name === 'NotFoundError') msg = 'No microphone found. Please connect a microphone and reload.';
          else if (err.name === 'NotReadableError') msg = 'Microphone is in use by another application. Close it and reload.';
          showMicError(msg);
        }
      }

      // ── Recording ─────────────────────────────────────────────────────────────

      var recordingChunks = [];
      var isRecording = false;
      var processorNode = null;
      var sourceNode = null;

      function startRecording() {
        recordingChunks = [];
        isRecording = true;
        state.recordingState = 'recording';
        sourceNode = state.audioCtx.createMediaStreamSource(state.micStream);
        processorNode = state.audioCtx.createScriptProcessor(4096, 1, 1);
        processorNode.onaudioprocess = function(e) {
          if (isRecording) {
            var data = e.inputBuffer.getChannelData(0);
            recordingChunks.push(new Float32Array(data));
          }
        };
        sourceNode.connect(processorNode);
        processorNode.connect(state.audioCtx.destination);
        renderMainArea();
      }

      function stopRecording() {
        isRecording = false;
        if (processorNode) {
          processorNode.disconnect();
          processorNode = null;
        }
        if (sourceNode) {
          sourceNode.disconnect();
          sourceNode = null;
        }
        // Merge chunks into single Float32Array
        var length = 0;
        for (var i = 0; i < recordingChunks.length; i++) length += recordingChunks[i].length;
        var merged = new Float32Array(length);
        var offset = 0;
        for (var i = 0; i < recordingChunks.length; i++) {
          merged.set(recordingChunks[i], offset);
          offset += recordingChunks[i].length;
        }
        state.currentRecording = merged;
        state.recordingState = 'review';
        renderMainArea();
      }

      // ── WAV Encoder ──────────────────────────────────────────────────────────

      function writeString(view, offset, string) {
        for (var i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }

      function encodeWAV(samples, sampleRate) {
        var numSamples = samples.length;
        var bytesPerSample = 2;
        var dataSize = numSamples * bytesPerSample;
        var buffer = new ArrayBuffer(44 + dataSize);
        var view = new DataView(buffer);

        // RIFF header
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        writeString(view, 8, 'WAVE');

        // fmt chunk
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);    // chunk size
        view.setUint16(20, 1, true);     // PCM format
        view.setUint16(22, 1, true);     // mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * bytesPerSample, true); // byte rate
        view.setUint16(32, bytesPerSample, true); // block align
        view.setUint16(34, 16, true);    // bits per sample

        // data chunk
        writeString(view, 36, 'data');
        view.setUint32(40, dataSize, true);

        // Convert float32 to int16
        var offset = 44;
        for (var i = 0; i < numSamples; i++) {
          var s = Math.max(-1, Math.min(1, samples[i]));
          s = s < 0 ? s * 0x8000 : s * 0x7FFF;
          view.setInt16(offset, s, true);
          offset += 2;
        }

        return buffer;
      }

      // ── File Saving ───────────────────────────────────────────────────────────

      function saveRecording(index, samples) {
        if (state.browser.canDirectSave && state.dirHandle) {
          saveRecordingDirect(index, samples);
        } else {
          saveRecordingZip(index, samples);
        }
      }

      async function saveRecordingDirect(index, samples) {
        var entry = state.entries[index];
        var wavBuffer = encodeWAV(samples, 44100);
        try {
          var fileHandle = await state.dirHandle.getFileHandle(entry.filename, { create: true });
          var writable = await fileHandle.createWritable();
          await writable.write(wavBuffer);
          await writable.close();
        } catch (err) {
          console.error('Failed to save file:', err);
        }
      }

      function saveRecordingZip(index, samples) {
        var entry = state.entries[index];
        var wavBuffer = encodeWAV(samples, 44100);
        state.zipEntries.set(entry.filename, wavBuffer);
        updateZipButton();
      }

      // ── ZIP encoder (store method, no compression) ────────────────────────────

      function crc32(data) {
        var table = new Uint32Array(256);
        for (var i = 0; i < 256; i++) {
          var c = i;
          for (var j = 0; j < 8; j++) {
            c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
          }
          table[i] = c;
        }
        var bytes = new Uint8Array(data);
        var crc = 0xFFFFFFFF;
        for (var i = 0; i < bytes.length; i++) {
          crc = table[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
        }
        return (crc ^ 0xFFFFFFFF) >>> 0;
      }

      function buildZip(entries) {
        // entries: Map of filename to ArrayBuffer
        var localParts = [];
        var centralParts = [];
        var offset = 0;
        var encoder = new TextEncoder();
        var entryCount = 0;

        entries.forEach(function(data, filename) {
          var nameBytes = encoder.encode(filename);
          var crc = crc32(data);
          var size = data.byteLength;

          // Local file header (30 bytes + filename length)
          var local = new ArrayBuffer(30 + nameBytes.length);
          var lv = new DataView(local);
          lv.setUint32(0, 0x04034b50, true);   // local file header signature
          lv.setUint16(4, 20, true);            // version needed
          lv.setUint16(6, 0, true);             // flags
          lv.setUint16(8, 0, true);             // compression: store
          lv.setUint16(10, 0, true);            // mod time
          lv.setUint16(12, 0, true);            // mod date
          lv.setUint32(14, crc, true);          // crc-32
          lv.setUint32(18, size, true);         // compressed size
          lv.setUint32(22, size, true);         // uncompressed size
          lv.setUint16(26, nameBytes.length, true); // filename length
          lv.setUint16(28, 0, true);            // extra field length
          new Uint8Array(local, 30).set(nameBytes);

          localParts.push(local);
          localParts.push(data);  // file data follows header

          // Central directory entry (46 bytes + filename length)
          var central = new ArrayBuffer(46 + nameBytes.length);
          var cv = new DataView(central);
          cv.setUint32(0, 0x02014b50, true);    // central dir signature
          cv.setUint16(4, 20, true);             // version made by
          cv.setUint16(6, 20, true);             // version needed
          cv.setUint16(8, 0, true);              // flags
          cv.setUint16(10, 0, true);             // compression: store
          cv.setUint16(12, 0, true);             // mod time
          cv.setUint16(14, 0, true);             // mod date
          cv.setUint32(16, crc, true);           // crc-32
          cv.setUint32(20, size, true);          // compressed size
          cv.setUint32(24, size, true);          // uncompressed size
          cv.setUint16(28, nameBytes.length, true); // filename length
          cv.setUint16(30, 0, true);             // extra field length
          cv.setUint16(32, 0, true);             // comment length
          cv.setUint16(34, 0, true);             // disk number start
          cv.setUint16(36, 0, true);             // internal attrs
          cv.setUint32(38, 0, true);             // external attrs
          cv.setUint32(42, offset, true);        // local header offset
          new Uint8Array(central, 46).set(nameBytes);

          centralParts.push(central);
          offset += 30 + nameBytes.length + size;
          entryCount++;
        });

        var centralDirOffset = offset;
        var centralDirSize = 0;
        for (var i = 0; i < centralParts.length; i++) centralDirSize += centralParts[i].byteLength;

        // End of central directory (22 bytes)
        var eocd = new ArrayBuffer(22);
        var ev = new DataView(eocd);
        ev.setUint32(0, 0x06054b50, true);
        ev.setUint16(4, 0, true);
        ev.setUint16(6, 0, true);
        ev.setUint16(8, entryCount, true);
        ev.setUint16(10, entryCount, true);
        ev.setUint32(12, centralDirSize, true);
        ev.setUint32(16, centralDirOffset, true);
        ev.setUint16(20, 0, true);

        var parts = localParts.concat(centralParts);
        parts.push(eocd);
        return new Blob(parts, { type: 'application/zip' });
      }

      function downloadZip() {
        if (state.zipEntries.size === 0) return;
        var blob = buildZip(state.zipEntries);
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'recordings.zip';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function updateZipButton() {
        if (state.browser.canDirectSave) return;
        var existing = document.getElementById('zip-download-btn');
        if (!existing) {
          existing = document.createElement('button');
          existing.id = 'zip-download-btn';
          existing.className = 'btn-zip-download';
          existing.addEventListener('click', downloadZip);
          var mainArea = document.querySelector('.main-area');
          if (mainArea) mainArea.insertBefore(existing, mainArea.firstChild);
        }
        existing.textContent = 'Download All (' + state.zipEntries.size + ' files)';
      }

      function getSessionKey(scriptName, entries) {
        var firstLine = entries.length > 0 ? entries[0].text : '';
        var raw = scriptName + '|' + firstLine + '|' + entries.length;
        var hash = 0;
        for (var i = 0; i < raw.length; i++) {
          hash = ((hash << 5) - hash) + raw.charCodeAt(i);
          hash |= 0;
        }
        return 'vlr_' + Math.abs(hash).toString(36);
      }

      function checkStorageAvailable() {
        try {
          localStorage.setItem('__vlr_test', '1');
          localStorage.removeItem('__vlr_test');
          return true;
        } catch (e) {
          return false;
        }
      }

      function saveSession() {
        if (!state.storageAvailable) return;
        var data = {
          currentIndex: state.currentIndex,
          completedLines: Array.from(state.completedLines),
        };
        try {
          localStorage.setItem(state.sessionKey, JSON.stringify(data));
        } catch (e) { /* silently fail */ }
      }

      function loadSession() {
        if (!state.storageAvailable) return null;
        try {
          var raw = localStorage.getItem(state.sessionKey);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (e) { return null; }
      }

      function showCompletionScreen() {
        state.screen = 'complete';

        // Clear #app safely
        var app = document.getElementById('app');
        while (app.firstChild) {
          app.removeChild(app.firstChild);
        }

        // Restore #app centering styles (may have been overridden by recording screen)
        app.style.display = '';
        app.style.padding = '';
        app.style.minHeight = '';

        var total = state.entries.length;

        // Outer completion container
        var container = document.createElement('div');
        container.className = 'completion';

        // Heading
        var heading = document.createElement('h1');
        heading.textContent = 'All Done!';
        container.appendChild(heading);

        // Message
        var msg = document.createElement('p');
        msg.textContent = 'All ' + total + ' lines have been recorded.';
        container.appendChild(msg);

        // Download ZIP button (zip mode only)
        if (!state.browser.canDirectSave) {
          var zipBtn = document.createElement('button');
          zipBtn.type = 'button';
          zipBtn.className = 'btn-begin';
          zipBtn.style.marginBottom = '1rem';
          zipBtn.textContent = 'Download All Recordings (ZIP)';
          zipBtn.addEventListener('click', function () {
            downloadZip();
          });
          container.appendChild(zipBtn);
        }

        // Start New Session button
        var restartBtn = document.createElement('button');
        restartBtn.type = 'button';
        restartBtn.className = 'btn-choose-folder';
        restartBtn.textContent = 'Start New Session';
        restartBtn.addEventListener('click', function () {
          clearSessionAndRestart();
        });
        container.appendChild(restartBtn);

        app.appendChild(container);
      }

      function clearSessionAndRestart() {
        if (state.storageAvailable) {
          localStorage.removeItem(state.sessionKey);
        }
        state.completedLines.clear();
        state.needsRerecord.clear();
        state.currentIndex = 0;
        state.zipEntries.clear();
        state.currentRecording = null;
        state.recordingState = 'idle';
        state.screen = 'landing';
        // Remove any zip notice bars
        var notice = document.getElementById('zip-notice');
        if (notice) notice.remove();
        var reloadNotice = document.getElementById('zip-reload-notice');
        if (reloadNotice) reloadNotice.remove();
        showLandingScreen();
      }

      function showLandingScreen() {
        // Reset state for a fresh landing
        state.entries = [];
        state.scriptName = '';
        state.sessionKey = '';
        state.dirHandle = null;
        state.micStream = null;
        state.audioCtx = null;
        state.modalOpen = false;
        state.playbackAudio = null;
        state.browser = null;

        // Clear #app safely
        var app = document.getElementById('app');
        while (app.firstChild) {
          app.removeChild(app.firstChild);
        }

        // Restore default #app centering styles
        app.style.display = '';
        app.style.padding = '';
        app.style.minHeight = '';

        renderLanding();
      }

      // ── Review state controls ─────────────────────────────────────────────────

      function playRecording() {
        var wavBuffer = encodeWAV(state.currentRecording, 44100);
        var blob = new Blob([wavBuffer], { type: 'audio/wav' });
        var url = URL.createObjectURL(blob);
        if (state.playbackAudio) {
          state.playbackAudio.pause();
          URL.revokeObjectURL(state.playbackAudio.src);
        }
        state.playbackAudio = new Audio(url);
        state.playbackAudio.play();
      }

      function keepRecording() {
        saveRecording(state.currentIndex, state.currentRecording);
        state.completedLines.add(state.currentIndex);
        state.needsRerecord.delete(state.currentIndex);
        state.currentRecording = null;
        state.recordingState = 'idle';
        advanceToNext();
        saveSession();
        renderMainArea();
        renderSidebar();
      }

      function retryRecording() {
        state.currentRecording = null;
        state.recordingState = 'idle';
        renderMainArea();
      }

      function advanceToNext() {
        var total = state.entries.length;
        for (var i = 1; i <= total; i++) {
          var idx = (state.currentIndex + i) % total;
          if (!state.completedLines.has(idx)) {
            state.currentIndex = idx;
            return;
          }
        }
        // All lines complete
        showCompletionScreen();
      }

      // ── Keyboard listeners ───────────────────────────────────────────────────

      document.addEventListener('keydown', function(e) {
        if (state.screen !== 'recording' || state.modalOpen) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (state.recordingState === 'review') {
          if (e.code === 'KeyP') { e.preventDefault(); playRecording(); }
          if (e.code === 'Enter') { e.preventDefault(); keepRecording(); }
          if (e.code === 'KeyR') { e.preventDefault(); retryRecording(); }
        }
        if (e.code === 'Space' && !e.repeat) {
          e.preventDefault();
          if (state.recordingState === 'idle') startRecording();
        }
      });

      document.addEventListener('keyup', function(e) {
        if (state.screen !== 'recording' || state.modalOpen) return;
        if (e.code === 'Space') {
          e.preventDefault();
          if (state.recordingState === 'recording') stopRecording();
        }
      });

      // ── Init ─────────────────────────────────────────────────────────────────

      renderLanding();

    }());
  </script>
</body>
</html>
