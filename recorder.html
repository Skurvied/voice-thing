<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Line Recorder</title>
  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Dark Theme Variables */
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-tertiary: #242736;
      --border-color: #2e3248;
      --text-primary: #e8eaf0;
      --text-secondary: #9aa0b8;
      --text-muted: #5c6280;
      --accent-primary: #6c7ef7;
      --accent-hover: #8491f9;
      --accent-active: #5a6be0;
      --accent-glow: rgba(108, 126, 247, 0.2);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    }

    /* Base */
    html, body {
      height: 100%;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* App container */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Landing Screen */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    /* Logo / Icon area */
    .landing__icon {
      width: 72px;
      height: 72px;
      background-color: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing__icon svg {
      width: 36px;
      height: 36px;
      fill: var(--accent-primary);
    }

    /* Title */
    .landing__title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .landing__subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 340px;
      line-height: 1.6;
    }

    /* Load Script button */
    .btn-load {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background-color: var(--accent-primary);
      color: #ffffff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      box-shadow: 0 0 0 0 var(--accent-glow);
      letter-spacing: 0.01em;
    }

    .btn-load:hover {
      background-color: var(--accent-hover);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-load:active {
      background-color: var(--accent-active);
      transform: translateY(1px);
    }

    .btn-load:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 3px;
    }

    .btn-load svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Hidden file input */
    .file-input-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip-path: inset(50%);
      white-space: nowrap;
    }

    /* Footer */
    .landing__footer {
      font-size: 0.825rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    /* Divider */
    .landing__divider {
      width: 40px;
      height: 2px;
      background-color: var(--border-color);
      border-radius: 2px;
    }

    /* ── Setup Screen ────────────────────────────────────────────────────────── */

    .setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .setup__icon {
      width: 60px;
      height: 60px;
      background-color: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .setup__icon svg {
      width: 28px;
      height: 28px;
      fill: var(--accent-primary);
    }

    .setup__title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    /* Info card */
    .setup__card {
      width: 100%;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }

    .setup__info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.875rem 1.25rem;
      gap: 1rem;
    }

    .setup__info-row + .setup__info-row {
      border-top: 1px solid var(--border-color);
    }

    .setup__info-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .setup__info-value {
      font-size: 0.875rem;
      color: var(--text-primary);
      font-weight: 500;
      text-align: right;
    }

    /* Saving section */
    .setup__saving {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    /* Notice (zip mode) */
    .setup__notice {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-align: left;
      width: 100%;
    }

    /* Choose Output Folder button */
    .btn-choose-folder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .btn-choose-folder:hover {
      background-color: var(--bg-secondary);
      border-color: var(--accent-primary);
    }

    .btn-choose-folder:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 3px;
    }

    .btn-choose-folder--selected {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    /* Begin Recording button */
    .btn-begin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--accent-primary);
      color: #ffffff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      box-shadow: 0 0 0 0 var(--accent-glow);
      letter-spacing: 0.01em;
    }

    .btn-begin:hover {
      background-color: var(--accent-hover);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-begin:active {
      background-color: var(--accent-active);
      transform: translateY(1px);
    }

    .btn-begin:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 3px;
    }

    /* ── Recording Screen ────────────────────────────────────────────────────── */

    .recording-screen { display: flex; height: 100vh; }
    .sidebar { width: 250px; overflow-y: auto; border-right: 1px solid var(--border-color, #333); background: var(--bg-secondary); }
    .sidebar-item { padding: 8px 12px; cursor: pointer; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sidebar-item:hover { background: rgba(255,255,255,0.05); }
    .sidebar-item.active { background: var(--accent-primary, #6366f1); color: #fff; }
    .sidebar-item.completed::before { content: '\2713  '; color: #4caf50; }
    .sidebar-item.needs-rerecord::before { content: '\26A0  '; color: #ff9800; }
    .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2em; position: relative; }
    .line-text { font-size: 1.5em; line-height: 1.6; max-width: 700px; text-align: center; margin-bottom: 1em; }
    .progress { font-size: 0.9em; opacity: 0.6; margin-bottom: 2em; }
    .file-label { font-size: 0.85em; opacity: 0.5; margin-bottom: 0.5em; font-family: monospace; }
    .display-name { font-size: 0.8em; opacity: 0.4; margin-bottom: 2em; }
    .record-prompt { font-size: 1.1em; opacity: 0.7; margin-top: 1em; }
    .shortcuts-footer { position: absolute; bottom: 1em; font-size: 0.75em; opacity: 0.4; font-family: monospace; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .recording-dot { width: 16px; height: 16px; background: #e53935; border-radius: 50%; animation: pulse 1s infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    (function () {
      'use strict';

      var SVG_NS = 'http://www.w3.org/2000/svg';

      // ── App state ─────────────────────────────────────────────────────────────

      var state = {
        entries: [],
        scriptName: '',
        currentIndex: 0,
        completedLines: new Set(),
        screen: 'landing',
        browser: null,
        dirHandle: null,
        recordingState: 'idle',
        micStream: null,
        audioCtx: null,
        currentRecording: null,
        modalOpen: false
      };

      // ── Browser detection ────────────────────────────────────────────────────

      /**
       * Detect the current browser and whether it supports the File System Access API.
       * @returns {{ name: string, canDirectSave: boolean }}
       */
      function detectBrowser() {
        var ua = navigator.userAgent;
        var name = 'Unknown';

        if (ua.includes('Firefox')) name = 'Firefox';
        else if (ua.includes('Edg/')) name = 'Edge';
        else if (ua.includes('OPR/') || ua.includes('Opera')) name = 'Opera';
        else if (ua.includes('Brave')) name = 'Brave';
        else if (ua.includes('Arc')) name = 'Arc';
        else if (ua.includes('Chrome')) name = 'Chrome';
        else if (ua.includes('Safari')) name = 'Safari';

        // Feature-detect File System Access API rather than relying solely on UA
        var canDirectSave = typeof window.showDirectoryPicker === 'function';

        return { name: name, canDirectSave: canDirectSave };
      }

      // ── Script parser ─────────────────────────────────────────────────────────

      /**
       * Parse a pipe-delimited script file.
       * Line 0 is treated as a header and skipped.
       * Each subsequent non-empty line must contain at least one `|`.
       * @param {string} rawText
       * @returns {Array<{filename: string, text: string, displayName: string}>}
       */
      function parseScript(rawText) {
        var lines = rawText.split('\n').filter(function(l) { return l.trim(); });
        if (lines.length < 2) throw new Error('Script file is empty or has only a header row.');

        var entries = [];
        var seenFilenames = {};
        var duplicates = [];

        for (var i = 1; i < lines.length; i++) {
          var pipeIdx = lines[i].indexOf('|');
          if (pipeIdx === -1) continue;
          var filename = lines[i].slice(0, pipeIdx).trim();
          var text = lines[i].slice(pipeIdx + 1).trim();
          if (!filename || !text) continue;

          if (seenFilenames[filename]) {
            duplicates.push(filename);
          } else {
            seenFilenames[filename] = true;
          }

          var displayName = text
            .toLowerCase()
            .replace(/[^a-z0-9\s]/g, '')
            .replace(/\s+/g, '_')
            .slice(0, 60);

          entries.push({ filename: filename, text: text, displayName: displayName });
        }

        if (duplicates.length > 0) {
          throw new Error('Duplicate filenames found: ' + duplicates.join(', '));
        }

        return entries;
      }

      // ── UI helpers ────────────────────────────────────────────────────────────

      /**
       * Display an error message on the landing screen.
       * Finds or creates a dedicated error paragraph and sets its text safely.
       * @param {string} msg
       */
      function showError(msg) {
        var errorEl = document.getElementById('landing-error');
        if (!errorEl) {
          errorEl = document.createElement('p');
          errorEl.id = 'landing-error';
          errorEl.style.cssText = 'color:#f87171;font-size:0.875rem;margin-top:0.5rem;';
          var landing = document.querySelector('.landing');
          if (landing) {
            landing.appendChild(errorEl);
          }
        }
        errorEl.textContent = msg;
      }

      /**
       * Render the setup screen into the #app container.
       * Detects browser capabilities and lets the user choose an output folder
       * (direct save) or acknowledges zip-download mode before proceeding.
       */
      function showSetupScreen() {
        var browser = detectBrowser();
        state.browser = browser;
        state.screen = 'setup';

        // Clear #app safely
        var app = document.getElementById('app');
        while (app.firstChild) {
          app.removeChild(app.firstChild);
        }

        // Outer container
        var setup = document.createElement('div');
        setup.className = 'setup';

        // -- Icon (reuse mic)
        var iconWrap = document.createElement('div');
        iconWrap.className = 'setup__icon';
        iconWrap.appendChild(buildMicIcon());
        setup.appendChild(iconWrap);

        // -- Title
        var title = document.createElement('h1');
        title.className = 'setup__title';
        title.textContent = 'Setup';
        setup.appendChild(title);

        // -- Info card
        var card = document.createElement('div');
        card.className = 'setup__card';

        // Browser row
        var browserRow = document.createElement('div');
        browserRow.className = 'setup__info-row';
        var browserLabel = document.createElement('span');
        browserLabel.className = 'setup__info-label';
        browserLabel.textContent = 'Browser';
        var browserValue = document.createElement('span');
        browserValue.className = 'setup__info-value';
        browserValue.textContent = browser.name;
        browserRow.appendChild(browserLabel);
        browserRow.appendChild(browserValue);
        card.appendChild(browserRow);

        // Save mode row
        var modeRow = document.createElement('div');
        modeRow.className = 'setup__info-row';
        var modeLabel = document.createElement('span');
        modeLabel.className = 'setup__info-label';
        modeLabel.textContent = 'Save mode';
        var modeValue = document.createElement('span');
        modeValue.className = 'setup__info-value';
        modeValue.textContent = browser.canDirectSave ? 'Direct folder save' : 'Zip download';
        modeRow.appendChild(modeLabel);
        modeRow.appendChild(modeValue);
        card.appendChild(modeRow);

        // Script row
        var scriptRow = document.createElement('div');
        scriptRow.className = 'setup__info-row';
        var scriptLabel = document.createElement('span');
        scriptLabel.className = 'setup__info-label';
        scriptLabel.textContent = 'Script';
        var scriptValue = document.createElement('span');
        scriptValue.className = 'setup__info-value';
        scriptValue.textContent = state.entries.length + ' lines loaded from ' + state.scriptName;
        scriptRow.appendChild(scriptLabel);
        scriptRow.appendChild(scriptValue);
        card.appendChild(scriptRow);

        setup.appendChild(card);

        // -- Saving section
        var savingSection = document.createElement('div');
        savingSection.className = 'setup__saving';

        // "Begin Recording" button — created now, shown after confirmation
        var beginBtn = document.createElement('button');
        beginBtn.type = 'button';
        beginBtn.className = 'btn-begin';
        beginBtn.textContent = 'Begin Recording';
        beginBtn.style.display = 'none';
        beginBtn.addEventListener('click', function () {
          showRecordingScreen();
        });

        if (browser.canDirectSave) {
          // Show "Choose Output Folder" button
          var chooseFolderBtn = document.createElement('button');
          chooseFolderBtn.type = 'button';
          chooseFolderBtn.className = 'btn-choose-folder';
          chooseFolderBtn.textContent = 'Choose Output Folder';
          chooseFolderBtn.addEventListener('click', function () {
            window.showDirectoryPicker({ mode: 'readwrite' })
              .then(function (handle) {
                state.dirHandle = handle;
                // Update button to show chosen folder name
                chooseFolderBtn.textContent = 'Folder: ' + handle.name;
                chooseFolderBtn.classList.add('btn-choose-folder--selected');
                beginBtn.style.display = '';
              })
              .catch(function (err) {
                // User cancelled or permission denied — do nothing
                if (err.name !== 'AbortError') {
                  console.error('showDirectoryPicker error:', err);
                }
              });
          });
          savingSection.appendChild(chooseFolderBtn);
        } else {
          // Show info message about zip mode
          var zipNotice = document.createElement('p');
          zipNotice.className = 'setup__notice';
          if (browser.name !== 'Unknown') {
            zipNotice.textContent = 'Your browser (' + browser.name + ') doesn\'t support direct folder saving. Recordings will be bundled as a zip download.';
          } else {
            zipNotice.textContent = 'Could not detect your browser. Some features may not work as expected. For the best experience, use Chrome or Edge.';
          }
          savingSection.appendChild(zipNotice);

          // Acknowledge and reveal begin button immediately
          beginBtn.style.display = '';
        }

        savingSection.appendChild(beginBtn);
        setup.appendChild(savingSection);

        app.appendChild(setup);
      }

      // ── SVG helpers ──────────────────────────────────────────────────────────

      /**
       * Create an SVG element with the given attributes.
       * @param {string} tag
       * @param {Object} attrs
       * @returns {SVGElement}
       */
      function createSvgEl(tag, attrs) {
        var el = document.createElementNS(SVG_NS, tag);
        Object.keys(attrs).forEach(function (key) {
          el.setAttribute(key, attrs[key]);
        });
        return el;
      }

      /**
       * Build the microphone SVG icon.
       * @returns {SVGElement}
       */
      function buildMicIcon() {
        var svg = createSvgEl('svg', { viewBox: '0 0 24 24', xmlns: 'http://www.w3.org/2000/svg' });
        // Mic body
        var rect = createSvgEl('rect', { x: '9', y: '2', width: '6', height: '11', rx: '3' });
        // Stand arc
        var path = createSvgEl('path', {
          d: 'M5 10a7 7 0 0 0 14 0',
          stroke: 'currentColor',
          'stroke-width': '2',
          'stroke-linecap': 'round',
          fill: 'none'
        });
        // Stand line
        var line = createSvgEl('line', {
          x1: '12', y1: '17', x2: '12', y2: '22',
          stroke: 'currentColor',
          'stroke-width': '2',
          'stroke-linecap': 'round'
        });
        // Base line
        var base = createSvgEl('line', {
          x1: '8', y1: '22', x2: '16', y2: '22',
          stroke: 'currentColor',
          'stroke-width': '2',
          'stroke-linecap': 'round'
        });
        svg.appendChild(rect);
        svg.appendChild(path);
        svg.appendChild(line);
        svg.appendChild(base);
        return svg;
      }

      /**
       * Build the folder/open icon for the load button.
       * @returns {SVGElement}
       */
      function buildFolderIcon() {
        var svg = createSvgEl('svg', { viewBox: '0 0 24 24', xmlns: 'http://www.w3.org/2000/svg' });
        var path = createSvgEl('path', {
          d: 'M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z',
          stroke: 'currentColor',
          'stroke-width': '2',
          'stroke-linejoin': 'round',
          fill: 'none'
        });
        svg.appendChild(path);
        return svg;
      }

      // ── DOM builders ─────────────────────────────────────────────────────────

      /**
       * Render the landing screen into the #app container.
       */
      function renderLanding() {
        var app = document.getElementById('app');

        // Root landing div
        var landing = document.createElement('div');
        landing.className = 'landing';

        // -- Icon
        var iconWrap = document.createElement('div');
        iconWrap.className = 'landing__icon';
        iconWrap.appendChild(buildMicIcon());
        landing.appendChild(iconWrap);

        // -- Title
        var title = document.createElement('h1');
        title.className = 'landing__title';
        title.textContent = 'Voice Line Recorder';
        landing.appendChild(title);

        // -- Subtitle
        var subtitle = document.createElement('p');
        subtitle.className = 'landing__subtitle';
        subtitle.textContent = 'Record audio for each line of your script. Load a .txt file to get started.';
        landing.appendChild(subtitle);

        // -- Divider
        var divider = document.createElement('div');
        divider.className = 'landing__divider';
        landing.appendChild(divider);

        // -- Hidden file input
        var fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.txt';
        fileInput.className = 'file-input-hidden';
        fileInput.id = 'script-file-input';
        fileInput.setAttribute('aria-label', 'Load script file');
        landing.appendChild(fileInput);

        // -- Load Script button
        var loadBtn = document.createElement('button');
        loadBtn.type = 'button';
        loadBtn.className = 'btn-load';


        loadBtn.appendChild(buildFolderIcon());

        var btnLabel = document.createTextNode('Load Script');
        loadBtn.appendChild(btnLabel);

        loadBtn.addEventListener('click', function () {
          fileInput.click();
        });

        // Wire up file parsing on selection
        fileInput.addEventListener('change', function () {
          var file = fileInput.files && fileInput.files[0];
          if (!file) return;

          var reader = new FileReader();
          reader.onload = function (e) {
            try {
              var entries = parseScript(e.target.result);
              state.entries = entries;
              state.scriptName = file.name;
              showSetupScreen();
            } catch (err) {
              showError(err.message);
            }
          };
          reader.onerror = function () {
            showError('Failed to read file. Please try again.');
          };
          reader.readAsText(file);
        });

        landing.appendChild(loadBtn);

        // -- Footer
        var footer = document.createElement('p');
        footer.className = 'landing__footer';
        footer.textContent = 'Open a .txt script file to begin';
        landing.appendChild(footer);

        app.appendChild(landing);
      }

      // ── Recording Screen ─────────────────────────────────────────────────────

      /**
       * Re-render the sidebar list to reflect current completedLines and currentIndex.
       * Expects a .sidebar element to exist in the DOM.
       */
      function renderSidebar() {
        var sidebar = document.querySelector('.sidebar');
        if (!sidebar) return;

        // Clear existing items safely
        while (sidebar.firstChild) {
          sidebar.removeChild(sidebar.firstChild);
        }

        state.entries.forEach(function (entry, idx) {
          var item = document.createElement('div');
          item.className = 'sidebar-item';
          if (state.completedLines.has(idx)) {
            item.classList.add('completed');
          }
          if (idx === state.currentIndex) {
            item.classList.add('active');
          }
          item.textContent = entry.filename;
          item.addEventListener('click', function () {
            state.currentIndex = idx;
            renderSidebar();
            renderMainArea();
          });
          sidebar.appendChild(item);
        });
      }

      /**
       * Re-render only the main area (right panel) based on current state.
       * Expects a .main-area element to exist in the DOM.
       */
      function renderMainArea() {
        var mainArea = document.querySelector('.main-area');
        if (!mainArea) return;

        // Clear existing content safely
        while (mainArea.firstChild) {
          mainArea.removeChild(mainArea.firstChild);
        }

        var entry = state.entries[state.currentIndex];
        var total = state.entries.length;

        // Progress indicator
        var progress = document.createElement('p');
        progress.className = 'progress';
        progress.textContent = (state.currentIndex + 1) + ' / ' + total;
        mainArea.appendChild(progress);

        // Current line text
        var lineText = document.createElement('p');
        lineText.className = 'line-text';
        lineText.textContent = entry ? entry.text : '';
        mainArea.appendChild(lineText);

        // Target filename
        var fileLabel = document.createElement('p');
        fileLabel.className = 'file-label';
        fileLabel.textContent = entry ? entry.filename : '';
        mainArea.appendChild(fileLabel);

        // Human-readable display name
        var displayName = document.createElement('p');
        displayName.className = 'display-name';
        displayName.textContent = entry ? entry.displayName : '';
        mainArea.appendChild(displayName);

        // Recording state area
        var recordPrompt = document.createElement('p');
        recordPrompt.className = 'record-prompt';
        if (state.recordingState === 'recording') {
          var dot = document.createElement('span');
          dot.className = 'recording-dot';
          recordPrompt.appendChild(dot);
          recordPrompt.appendChild(document.createTextNode('Recording…'));
        } else if (state.recordingState === 'review') {
          recordPrompt.textContent = 'Recording complete';
        } else {
          recordPrompt.textContent = 'Hold SPACE to record';
        }
        mainArea.appendChild(recordPrompt);

        // Keyboard shortcuts footer
        var footer = document.createElement('p');
        footer.className = 'shortcuts-footer';
        footer.textContent = 'SPACE record | P play | ENTER keep | R retry';
        mainArea.appendChild(footer);
      }

      /**
       * Transition from the setup screen to the recording screen.
       * Builds the two-panel layout (sidebar + main area).
       */
      function showRecordingScreen() {
        state.screen = 'recording';
        state.recordingState = 'idle';

        // Clear #app safely
        var app = document.getElementById('app');
        while (app.firstChild) {
          app.removeChild(app.firstChild);
        }

        // Remove centering from #app so the full-height flex layout works
        app.style.display = 'block';
        app.style.padding = '0';
        app.style.minHeight = '';

        // Outer recording screen wrapper
        var screen = document.createElement('div');
        screen.className = 'recording-screen';

        // Sidebar
        var sidebar = document.createElement('div');
        sidebar.className = 'sidebar';
        screen.appendChild(sidebar);

        // Main area
        var mainArea = document.createElement('div');
        mainArea.className = 'main-area';
        screen.appendChild(mainArea);

        app.appendChild(screen);

        // Populate both panels
        renderSidebar();
        renderMainArea();

        // Request microphone access
        initMicrophone();
      }

      // ── Microphone ───────────────────────────────────────────────────────────

      /**
       * Display a full-screen, blocking error overlay with the given message.
       * @param {string} msg
       */
      function showMicError(msg) {
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,17,23,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:2rem;';

        var icon = document.createElement('div');
        icon.style.cssText = 'font-size:3rem;margin-bottom:1.5rem;';
        icon.textContent = '\u26A0\uFE0F';
        overlay.appendChild(icon);

        var heading = document.createElement('h2');
        heading.style.cssText = 'color:#f87171;font-size:1.25rem;font-weight:700;margin-bottom:1rem;text-align:center;';
        heading.textContent = 'Microphone Error';
        overlay.appendChild(heading);

        var msgEl = document.createElement('p');
        msgEl.style.cssText = 'color:#e8eaf0;font-size:0.95rem;line-height:1.6;max-width:480px;text-align:center;';
        msgEl.textContent = msg;
        overlay.appendChild(msgEl);

        document.body.appendChild(overlay);
      }

      /**
       * Request microphone access and set up the AudioContext.
       * Displays a blocking error overlay on failure.
       */
      async function initMicrophone() {
        try {
          state.micStream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: 44100, channelCount: 1, echoCancellation: false }
          });
          state.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        } catch (err) {
          var msg = 'Microphone error: ' + err.message;
          if (err.name === 'NotAllowedError') msg = 'Microphone access denied. Please allow microphone access in your browser settings and reload.';
          else if (err.name === 'NotFoundError') msg = 'No microphone found. Please connect a microphone and reload.';
          else if (err.name === 'NotReadableError') msg = 'Microphone is in use by another application. Close it and reload.';
          showMicError(msg);
        }
      }

      // ── Recording ─────────────────────────────────────────────────────────────

      var recordingChunks = [];
      var isRecording = false;
      var processorNode = null;
      var sourceNode = null;

      function startRecording() {
        recordingChunks = [];
        isRecording = true;
        state.recordingState = 'recording';
        sourceNode = state.audioCtx.createMediaStreamSource(state.micStream);
        processorNode = state.audioCtx.createScriptProcessor(4096, 1, 1);
        processorNode.onaudioprocess = function(e) {
          if (isRecording) {
            var data = e.inputBuffer.getChannelData(0);
            recordingChunks.push(new Float32Array(data));
          }
        };
        sourceNode.connect(processorNode);
        processorNode.connect(state.audioCtx.destination);
        renderMainArea();
      }

      function stopRecording() {
        isRecording = false;
        if (processorNode) {
          processorNode.disconnect();
          processorNode = null;
        }
        if (sourceNode) {
          sourceNode.disconnect();
          sourceNode = null;
        }
        // Merge chunks into single Float32Array
        var length = 0;
        for (var i = 0; i < recordingChunks.length; i++) length += recordingChunks[i].length;
        var merged = new Float32Array(length);
        var offset = 0;
        for (var i = 0; i < recordingChunks.length; i++) {
          merged.set(recordingChunks[i], offset);
          offset += recordingChunks[i].length;
        }
        state.currentRecording = merged;
        state.recordingState = 'review';
        renderMainArea();
      }

      // ── Keyboard listeners ───────────────────────────────────────────────────

      document.addEventListener('keydown', function(e) {
        if (state.screen !== 'recording' || state.modalOpen) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'Space' && !e.repeat) {
          e.preventDefault();
          if (state.recordingState === 'idle') startRecording();
        }
      });

      document.addEventListener('keyup', function(e) {
        if (state.screen !== 'recording' || state.modalOpen) return;
        if (e.code === 'Space') {
          e.preventDefault();
          if (state.recordingState === 'recording') stopRecording();
        }
      });

      // ── Init ─────────────────────────────────────────────────────────────────

      renderLanding();

    }());
  </script>
</body>
</html>
